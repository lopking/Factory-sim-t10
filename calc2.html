
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Sim — Calculators</title>
<style>
  
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap');
  :root {
          --bg: #080b0f;
          --panel: #0d1117;
          --panel2: #111720;
          --border: #1c2530;
          --accent: #00e5ff;
          --green: #39ff14;
          --orange: #ff8c42;
          --purple: #bf7fff;
          --gold: #ffd700;
          --red: #ff4466;
          --text: #c8d8e8;
          --dim: #4a5a6a;
          --dim2: #2a3540;
          /* RGB triplets for use in rgba() — kept in sync by applyTheme() */
          --accent-rgb: 0, 229, 255;
          --green-rgb:  57, 255, 20;
          --orange-rgb: 255, 140, 66;
          --purple-rgb: 191, 127, 255;
          --gold-rgb:   255, 215, 0;
          --red-rgb:    255, 68, 102;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body
        { background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 13px; min-height: 100vh;
        }
  
  header {
          padding: 28px 32px 22px; border-bottom: 2px solid var(--accent); background: linear-gradient(135deg, #080b0f, #0d1a24 60%, #080b0f); position: relative; overflow: hidden;
  }
  header .glow {
          position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 700px; height: 160px; background: radial-gradient(ellipse, rgba(0,229,255,0.12), transparent 70%); pointer-events: none;
  }
  h1 {
          font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 24px rgba(0,229,255,0.5); 
  }
  .subtitle {
          font-family: 'Share Tech Mono', monospace; color: var(--dim); font-size: 11px; letter-spacing: 2px; margin-top: 5px;
  }
        
  .container { max-width: 1300px; margin: 0 auto; padding: 28px 20px 60px; }
  .card { background: var(--panel); border: 1px solid var(--border); margin-bottom: 28px; }
  .card-head { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .card-head.gold  { background: rgba(255,215,0,0.08); color: var(--gold); border-bottom-color: rgba(255,215,0,0.2); }
  .card-head.cyan  { background: rgba(0,229,255,0.08); color: var(--accent); border-bottom-color: rgba(0,229,255,0.2); }
  .card-body { padding: 20px; }
  
  .calc-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 15px;}
  .calc-group { display: flex; flex-direction: column; gap: 5px; }
  .calc-group label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); text-transform: uppercase; }
  select, input { background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; outline: none; font-family: 'Share Tech Mono', monospace; }
  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 18px 20px;
    margin-bottom: 24px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 200px; }
  .calc-group label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); text-transform: uppercase; }
  select, input { background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; outline: none; font-family: 'Share Tech Mono', monospace; }
  
  select, input[type=text] {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; padding: 9px 13px;
    outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: #111720; }

  .btn { background: rgba(0,229,255,0.1); border: 1px solid var(--accent); color: var(--accent); font-family: 'Orbitron', monospace; font-size: 10px; padding: 8px 20px; cursor: pointer; text-transform: uppercase; text-decoration: none;}
  .btn:hover { background: rgba(0,229,255,0.2); }
  .btn-primary { background: rgba(0,229,255,0.1); border-color: var(--accent); color: var(--accent); }
  .btn-primary:hover { background: rgba(0,229,255,0.22); }
  .btn-ghost { background: transparent; border-color: var(--border); color: var(--dim); }
  .btn-ghost:hover { border-color: var(--purple); color: var(--purple); }

  .grid { display: flex; gap: 20px; margin-top: 15px; }
  .col { flex: 1; background: var(--panel2); border: 1px solid var(--border); padding: 15px;}
  h3 { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
  .item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed var(--border); font-family: 'Share Tech Mono', monospace;}

  .nav-row {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 10px; margin-top: 15px;
  }
  .nav-row a {
    font-family: 'Orbitron', monospace; font-size: 10px;
    padding: 8px 16px; letter-spacing: 2px; text-transform: uppercase;
    background: rgba(0,229,255,0.1); border: 1px solid var(--accent); color: var(--accent);
    text-decoration: none; transition: all 0.15s; white-space: nowrap;
  }
  .nav-row a:hover { background: rgba(0,229,255,0.2); }
  .nav-row a.current { background: var(--accent); color: #051018; }

  /* === Theme customization === */
  #themeBtn {
    position: fixed; bottom: 20px; right: 20px; z-index: 500;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--accent);
    color: var(--accent); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 12px rgba(0,229,255,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #themeBtn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(0,0,0,0.7), 0 0 20px rgba(0,229,255,0.4); }
  #themeBtn:active { transform: scale(0.95); }

  #themePanel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 340px; max-width: 92vw;
    background: var(--panel); border-left: 1px solid var(--border);
    box-shadow: -10px 0 40px rgba(0,0,0,0.5);
    z-index: 1100;
    transform: translateX(100%);
    transition: transform 0.25s ease-out;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #themePanel.visible { transform: translateX(0); }

  .tp-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    background: rgba(0,229,255,0.05); flex-shrink: 0;
  }
  .tp-head h3 {
    font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  }
  .tp-close {
    background: transparent; border: 1px solid var(--border); color: var(--dim);
    font-size: 16px; width: 28px; height: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .tp-close:hover { border-color: var(--red); color: var(--red); }

  .tp-body { flex: 1; overflow-y: auto; padding: 16px; }
  .tp-section { margin-bottom: 22px; }
  .tp-section-title {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim);
    margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 4px;
  }

  .tp-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .tp-preset {
    cursor: pointer; padding: 10px 6px; text-align: center;
    background: var(--panel2); border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    color: var(--text); letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .tp-preset:hover { border-color: var(--accent); }
  .tp-preset.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .tp-preset .swatch-row { display: flex; gap: 2px; margin-bottom: 6px; height: 14px; }
  .tp-preset .swatch-row span { flex: 1; }

  .tp-color { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .tp-color label {
    flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--text); cursor: pointer;
  }
  .tp-color input[type=color] {
    width: 38px; height: 28px; padding: 0; border: 1px solid var(--border);
    background: transparent; cursor: pointer; border-radius: 2px;
  }
  .tp-color input[type=color]::-webkit-color-swatch-wrapper { padding: 2px; }
  .tp-color input[type=color]::-webkit-color-swatch { border: none; border-radius: 1px; }
  .tp-color input[type=color]::-moz-color-swatch { border: none; border-radius: 1px; }
  .tp-hex {
    width: 84px; font-family: 'Share Tech Mono', monospace; font-size: 10px;
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 8px; text-transform: uppercase;
  }
  .tp-hex:focus { border-color: var(--accent); outline: none; }

  .tp-actions { display: flex; gap: 8px; margin-top: 4px; }
  .tp-action {
    flex: 1; padding: 9px; cursor: pointer;
    background: rgba(0,229,255,0.08); border: 1px solid var(--accent); color: var(--accent);
    font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; transition: all 0.15s;
  }
  .tp-action:hover { background: rgba(0,229,255,0.2); }
  .tp-action.danger { border-color: var(--red); color: var(--red); background: rgba(255,68,102,0.08); }
  .tp-action.danger:hover { background: rgba(255,68,102,0.2); }

  /* === Mobile responsiveness === */
  @media (max-width: 700px) {
    .container { padding: 14px 10px 40px; }
    header { padding: 18px 14px 16px; }
    h1 { font-size: 16px !important; letter-spacing: 1.5px !important; }
    .subtitle { font-size: 9px !important; letter-spacing: 1px !important; }
    .nav-row { gap: 6px; margin-top: 12px; }
    .nav-row a { padding: 7px 11px; font-size: 9px; letter-spacing: 1px; }

    .controls { flex-direction: column; align-items: stretch; gap: 10px; padding: 14px; }
    .ctrl-group, .calc-group { min-width: 0 !important; max-width: 100% !important; flex: 1 1 100% !important; }
    .controls > .btn, .calc-row > .btn { width: 100%; text-align: center; padding: 11px; }

    .card-head { font-size: 9px !important; padding: 8px 12px !important; letter-spacing: 1.5px !important; }
    .card-body { padding: 14px !important; }

    .grid { flex-direction: column; gap: 14px; }
    .col { padding: 12px; }
    h3 { font-size: 10px !important; }
    .item-row { font-size: 10px !important; padding: 6px 0 !important; }

    select, input[type=text], input[type=number] { font-size: 11px !important; padding: 9px 11px !important; }

    #themeBtn { bottom: 14px; right: 14px; width: 48px; height: 48px; }
    #themePanel { width: 100vw; max-width: 100vw; }
  }
</style>
</head>
<body>

<header>
  <div class="glow"></div>
  <h1>⚙ Factory Sim — Calculators</h1>
  <div class="subtitle">MACHINE CALCULATOR · FULL CHAIN CALCULATOR</div>
  <nav class="nav-row">
    <a href="index.html">List</a>
    <a href="calc.html">Ratios</a>
    <a href="calc2.html" class="current">Calculator</a>
  </nav>
</header>

<div class="container">

  <div class="card">
    <div class="card-head gold">📊 Machine Ratio Calculator (Mines per Machine)</div>
    <div class="card-body">
      <div class="calc-row">
        <div class="calc-group">
          <label>Select Machine</label>
          <select id="calcMachine">
            <option value="single">Single Assembler (3.125s)</option>
            <option value="dual">Dual Assembler (1.875s)</option>
            <option value="quad">Quad Assembler (1.875s)</option>
            <option value="triple">Triple Assembler (1.667s)</option>
            <option value="accel">Accelerator (1.429s)</option>
            <option value="workstation">Workstation (1.429s)</option>
            <option value="quint">Quintuple Assembler (2.5s)</option>
            <option value="spectrum">Spectrum Cutter (0.5s)</option>
            <option value="reactor">Fluid Reactor (1.0s)</option>
            <option value="filter">Pressure Filter (1.5s)</option>
            <option value="distill">Distillation Tower (0.25s)</option>
            <option value="formInj">Form Injector (0.75s)</option>
            <option value="mixer">Multi-Flow Mixer (0.25s)</option>
            <option value="tumbler">Tumbler (0.25s)</option>
            </select>
        </div>
        <div class="calc-group">
          <label>Number of Machines</label>
          <input type="number" id="calcCount" value="1" min="1" style="width:100px;">
        </div>
        <button class="btn" onclick="calculateRatio()">Calculate Ratios →</button>
      </div>
      <div id="ratioResult" style="font-family: 'Share Tech Mono', monospace; color: var(--gold); margin-top: 10px;"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head cyan">🧮 Full Factory Chain Calculator</div>
   <div class="controls">
    <div class="ctrl-group" style="max-width:380px;">
      <label>Select Item to View Chain</label>
      <select id="itemSelect">
        <option value="Olympus Dyson Axiom">🏆 Olympus Dyson Axiom (ODA)</option>
        <option value="Olympus Tri-Axiom">🏆 Olympus Tri-Axiom (OTA)</option>
      </select>
        </div>
        <div class="calc-group">
          <label>Number of Final Machines</label>
          <input type="number" id="calcRate" value="1" step="1" style="width:100px;">
        </div>
        <div class="calc-group" style="justify-content:flex-end;">
          <label>1.5x Harvest Gamepass</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 0;">
            <input type="checkbox" id="harvest15x" style="width:16px;height:16px;cursor:pointer;">
            <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green);">Active</span>
          </label>
        </div>
        <button class="btn" onclick="runFullChainCalc()">Calculate Full Factory →</button>
      </div>

      <div class="grid" id="chainResultsArea" style="display:none; flex-wrap:wrap;">
        <div class="col" id="machineList"><h3>🏭 Machines Needed</h3><div class="content"></div></div>
        <div class="col" id="mineList"><h3>⛏️ Mines & Farms</h3><div class="content"></div></div>
        <div class="col" id="fluidList"><h3>💧 Fluid Consumption</h3><div class="content"></div></div>
      </div>
    </div>
  </div>

</div>

<button id="themeBtn" onclick="toggleThemePanel()" title="Customize colors">🎨</button>

<div id="themePanel" aria-hidden="true">
  <div class="tp-head">
    <h3>🎨 Theme Studio</h3>
    <button class="tp-close" onclick="toggleThemePanel()" title="Close">✕</button>
  </div>
  <div class="tp-body">

    <div class="tp-section">
      <div class="tp-section-title">⚡ Preset Themes</div>
      <div class="tp-presets" id="tpPresets"></div>
    </div>

    <div class="tp-section">
      <div class="tp-section-title">🎨 Custom Colors</div>

      <div class="tp-color">
        <label for="c-bg">Background</label>
        <input type="color" id="c-bg" data-var="--bg" value="#080b0f">
        <input type="text" class="tp-hex" id="h-bg" value="#080B0F" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-panel">Panel</label>
        <input type="color" id="c-panel" data-var="--panel" value="#0d1117">
        <input type="text" class="tp-hex" id="h-panel" value="#0D1117" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-panel2">Panel (alt)</label>
        <input type="color" id="c-panel2" data-var="--panel2" value="#111720">
        <input type="text" class="tp-hex" id="h-panel2" value="#111720" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-border">Border</label>
        <input type="color" id="c-border" data-var="--border" value="#1c2530">
        <input type="text" class="tp-hex" id="h-border" value="#1C2530" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-text">Text</label>
        <input type="color" id="c-text" data-var="--text" value="#c8d8e8">
        <input type="text" class="tp-hex" id="h-text" value="#C8D8E8" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-accent">Accent (cyan)</label>
        <input type="color" id="c-accent" data-var="--accent" value="#00e5ff">
        <input type="text" class="tp-hex" id="h-accent" value="#00E5FF" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-green">Raw / Green</label>
        <input type="color" id="c-green" data-var="--green" value="#39ff14">
        <input type="text" class="tp-hex" id="h-green" value="#39FF14" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-orange">Byproduct / Orange</label>
        <input type="color" id="c-orange" data-var="--orange" value="#ff8c42">
        <input type="text" class="tp-hex" id="h-orange" value="#FF8C42" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-purple">Machine / Purple</label>
        <input type="color" id="c-purple" data-var="--purple" value="#bf7fff">
        <input type="text" class="tp-hex" id="h-purple" value="#BF7FFF" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-gold">Target / Gold</label>
        <input type="color" id="c-gold" data-var="--gold" value="#ffd700">
        <input type="text" class="tp-hex" id="h-gold" value="#FFD700" maxlength="7">
      </div>

      <div class="tp-color">
        <label for="c-red">Danger / Red</label>
        <input type="color" id="c-red" data-var="--red" value="#ff4466">
        <input type="text" class="tp-hex" id="h-red" value="#FF4466" maxlength="7">
      </div>
    </div>

    <div class="tp-actions">
      <button class="tp-action" onclick="exportTheme()">📋 Copy</button>
      <button class="tp-action" onclick="importTheme()">📥 Paste</button>
      <button class="tp-action danger" onclick="resetTheme()">↺ Reset</button>
    </div>

  </div>
</div>

<script>

function calculateRatio() {
  const key = document.getElementById('calcMachine').value;
  const n = parseFloat(document.getElementById('calcCount').value) || 1;
  const m = machineData[key];
  const res = document.getElementById('ratioResult');
  if (!m) return;

  const totalMines = m.mines * n;
  const totalExt   = m.extractors * n;
  const minesRound = Math.ceil(totalMines);
  const extRound   = Math.ceil(totalExt);

  let html = `<div style="line-height:1.8;">`;
  html += `Running <strong style="color:var(--gold)">${n} ${m.name}s</strong>:<br>`;

  if (totalMines > 0) {
    html += `🟢 ${totalMines.toFixed(2)} ${m.mineLabel} <span style="color:var(--dim)">→</span> <strong style="color:#fff">${minesRound} Mines</strong><br>`;
  }
  if (totalExt > 0) {
    html += `🟠 ${totalExt.toFixed(2)} ${m.extractLabel} <span style="color:var(--dim)">→</span> <strong style="color:#fff">${extRound} Extractors</strong><br>`;
  }
  
  html += `<div style="font-size:10px; color:var(--dim); margin-top:5px;">Cycle: ${m.time}s | Rate: ${(n/m.time).toFixed(2)} items/sec</div>`;
  html += `</div>`;

  res.innerHTML = html;
}

const FLUID_STOPS = new Set(['Eveready Petroleum', 'Treated Alto Fluid', 'Balancer Solution', 'Fluid Garnet']);

const PRIMARY_ORE_PROCESSORS = {
  'Terrastrix Gravel':        { label: 'Terrastrix Ore Mine',    minesPerMachine: 10 },
  'Stratosteel Gravel':       { label: 'Stratosteel Ore Mine',   minesPerMachine: 10 },
  'Coreodeon Gravel':         { label: 'Coreodeon Ore Mine',     minesPerMachine: 10 },
  'Aerelium Shard':           { label: 'Aerelium Crystal Mine',  minesPerMachine: 10 },
  'Aerelium Gem':             { label: 'Aerelium Crystal Mine',  minesPerMachine: 10 },
  'Chromastone Gem':          { label: 'Chromastone Mine',       minesPerMachine: 5  },
  'Reatomized Chromastone':   { label: 'Chromastone Mine',       minesPerMachine: 5  },
  'Mesossential Wood Boards': { label: 'Mesossential Tree Farm', minesPerMachine: 10 },
};

const RAW_RATES = {
  'Terrastrix Ore':      { rate: 0.2,  label: 'Terrastrix Ore Mine' },
  'Stratosteel Ore':     { rate: 0.2,  label: 'Stratosteel Ore Mine' },
  'Coreodeon Ore':       { rate: 0.2,  label: 'Coreodeon Ore Mine' },
  'Aerelium Crystal':    { rate: 0.2,  label: 'Aerelium Crystal Mine' },
  'Chromastone Crystal': { rate: 0.1,  label: 'Chromastone Mine' },
  'Mesossential Wood':   { rate: 0.2,  label: 'Mesossential Tree Farm' },
};

function runFullChainCalc() {
  const target       = document.getElementById('itemSelect').value;
  const machineCount = parseFloat(document.getElementById('calcRate').value) || 1;
  const harvest15x   = document.getElementById('harvest15x') ? document.getElementById('harvest15x').checked : false;
  if (!target || !recipes[target]) return;

  const topItem      = recipes[target];
  const topCycle     = machineCycleTimes[topItem.machine] || 1.0;
  const topOutputQty = machineOutputQty[topItem.machine] || 1;
  const targetRate   = machineCount * topOutputQty / topCycle;

  const requiredRates = {};

  function accumulateRates(itemName, rate) {
    const item = recipes[itemName];
    if (!item) return;
    if (item.type === 'byproduct') return;

    if (FLUID_STOPS.has(itemName)) {
      requiredRates[itemName] = (requiredRates[itemName] || 0) + rate;
      return;
    }

    if (item.raw) {
      requiredRates[itemName] = (requiredRates[itemName] || 0) + rate;
      return;
    }

    if (DISTILLATION_SOURCE[itemName]) {
      requiredRates[itemName] = (requiredRates[itemName] || 0) + rate;
      return;
    }

    requiredRates[itemName] = (requiredRates[itemName] || 0) + rate;

    if (item.inputs) {
      const outputQty   = machineOutputQty[item.machine] || 1;
      const inputCounts = {};
      item.inputs.forEach(inp => { inputCounts[inp] = (inputCounts[inp] || 0) + 1; });
      for (const [inp, count] of Object.entries(inputCounts)) {
        accumulateRates(inp, (rate / outputQty) * count);
      }
    }
  }

  accumulateRates(target, targetRate);

  for (const [srcFluid, products] of Object.entries(DISTILLATION_GROUPS)) {
    const rates   = products.map(p => requiredRates[p] || 0);
    const maxRate = Math.max(...rates);
    if (maxRate === 0) continue;
    requiredRates[srcFluid] = (requiredRates[srcFluid] || 0) + maxRate;
    products.forEach(p => { if ((requiredRates[p] || 0) > 0) requiredRates[p] = maxRate; });
  }

  const machineItems = {};
  const mines        = {};
  const countedDistillSources = new Set();

  for (const [itemName, rate] of Object.entries(requiredRates)) {
    const item = recipes[itemName];
    if (!item) continue;

    if (item.raw) continue;
    
    if (FLUID_STOPS.has(itemName)) continue;

    if (DISTILLATION_SOURCE[itemName]) {
      const src = DISTILLATION_SOURCE[itemName];
      if (countedDistillSources.has(src)) continue;
      countedDistillSources.add(src);
      const cycleTime = machineCycleTimes['T10+ Distillation Tower'];
      const cnt = rate * cycleTime;
      machineItems['T10+ Distillation Tower'] = {
        machine: 'T10+ Distillation Tower',
        count: (machineItems['T10+ Distillation Tower']?.count || 0) + cnt
      };
      continue;
    }

    const cycleTime = machineCycleTimes[item.machine] || 1.0;
    const outputQty = machineOutputQty[item.machine] || 1;
    const cnt       = rate * cycleTime / outputQty;

    if (PRIMARY_ORE_PROCESSORS[itemName]) {
      const { label, minesPerMachine } = PRIMARY_ORE_PROCESSORS[itemName];
      mines[label] = (mines[label] || 0) + cnt * minesPerMachine;
    }

    if (!machineItems[itemName]) {
      machineItems[itemName] = { machine: item.machine, count: 0 };
    }
    machineItems[itemName].count += cnt;
  }

  if (machineItems[target]) machineItems[target].count = machineCount;

  const harvestMult = harvest15x ? 1.5 : 1.0;

  const ORE_MINE_LABELS = new Set(['Terrastrix Ore Mine', 'Stratosteel Ore Mine', 'Coreodeon Ore Mine']);
  const totalOreMines   = Object.entries(mines)
    .filter(([label]) => ORE_MINE_LABELS.has(label))
    .reduce((s, [, v]) => s + v, 0);
  const acceleratorCount = totalOreMines / 26.67;

  if (acceleratorCount > 0) {
    if (!machineItems['Essential Chroma Dye']) {
      machineItems['Essential Chroma Dye'] = { machine: 'T10+ Accelerator', count: 0 };
    }
    machineItems['Essential Chroma Dye'].count = acceleratorCount;
  }

  const tumblerCount = Object.entries(machineItems)
    .filter(([, { machine }]) => machine === 'T10+ Tumbler')
    .reduce((s, [, { count }]) => s + count, 0);
  const totalVeinLS = tumblerCount * 192;

  const distillTowerCount = machineItems['T10+ Distillation Tower']?.count || 0;
  const totalAltoLS = distillTowerCount * 140;

  const adjVeinLS = totalVeinLS / harvestMult;
  const adjAltoLS = totalAltoLS / harvestMult;



  document.getElementById('chainResultsArea').style.display = 'flex';

  const machContent  = document.querySelector('#machineList .content');
  const mineContent  = document.querySelector('#mineList .content');
  const fluidContent = document.querySelector('#fluidList .content');

  machContent.innerHTML  = '';
  mineContent.innerHTML  = '';
  fluidContent.innerHTML = '';

  const ASSEMBLER_TYPES = new Set([
    'T10+ Assembler', 'T10+ Dual Assembler', '102+ Dual Assembler',
    'T10+ Triple Assembler', 'T10+ Quadruple Assembler', 'T10+ Quintuple Assembler',
    'T10+ Accelerator', 'T10+ Workstation',
  ]);

  const assemblerGroups = {};
  const otherMachines   = {};

  for (const [itemName, { machine, count }] of Object.entries(machineItems)) {
    if (ASSEMBLER_TYPES.has(machine)) {
      if (!assemblerGroups[machine]) assemblerGroups[machine] = [];
      assemblerGroups[machine].push({ itemName, count });
    } else {
      otherMachines[machine] = (otherMachines[machine] || 0) + count;
    }
  }

  machContent.innerHTML = '';

  for (const [machineName, items] of Object.entries(assemblerGroups)) {
    const totalCount = items.reduce((s, i) => s + i.count, 0);
    machContent.innerHTML += `<div class="item-row" style="margin-top:8px;">
      <span><b>${machineName}</b></span>
      <span><b>${Math.ceil(totalCount)}</b>x <span style="color:var(--dim);font-size:10px;">(${totalCount.toFixed(2)})</span></span>
    </div>`;
    for (const { itemName, count } of items) {
      machContent.innerHTML += `<div class="item-row" style="padding-left:14px;opacity:0.8;">
        <span style="color:var(--dim);font-size:11px;">↳ ${itemName}</span>
        <span style="font-size:11px;">${Math.ceil(count)}x <span style="color:var(--dim);font-size:10px;">(${count.toFixed(2)})</span></span>
      </div>`;
    }
  }

  for (const [machineName, count] of Object.entries(otherMachines)) {
    machContent.innerHTML += `<div class="item-row">
      <span>${machineName}</span>
      <span><b>${Math.ceil(count)}</b>x <span style="color:var(--dim);font-size:10px;">(${count.toFixed(2)})</span></span>
    </div>`;
  }

  for (const [label, count] of Object.entries(mines)) {
    const adjusted = count / harvestMult;
    mineContent.innerHTML += `<div class="item-row">
      <span>${label}</span>
      <span><b>${Math.ceil(adjusted)}</b>x <span style="color:var(--dim);font-size:10px;">(${adjusted.toFixed(4)})</span></span>
    </div>`;
  }

  if (adjVeinLS > 0 || adjAltoLS > 0) {
    if (adjVeinLS > 0) fluidContent.innerHTML += `<div class="item-row">
      <span>Vein Petroleum</span>
      <span><b>${adjVeinLS.toFixed(2)}</b> L/s</span>
    </div>`;
    if (adjAltoLS > 0) fluidContent.innerHTML += `<div class="item-row">
      <span>Aqueous Alto</span>
      <span><b>${adjAltoLS.toFixed(2)}</b> L/s</span>
    </div>`;
  }

  if (!machContent.innerHTML)  machContent.innerHTML  = '<div style="color:var(--dim)">—</div>';
  if (!mineContent.innerHTML)  mineContent.innerHTML  = '<div style="color:var(--dim)">—</div>';
  if (!fluidContent.innerHTML) fluidContent.innerHTML = '<div style="color:var(--dim)">—</div>';
}

// ====================================================================
// THEME STUDIO — preset themes + custom color pickers, saved to localStorage
// (shared across index.html / calc.html / calc2.html via the same storage key)
// ====================================================================

const DEFAULT_THEME = {

function hexToRgbTriplet(hex) {
  const h = (hex || '').replace('#','').padEnd(6, '0').slice(0, 6);
  const r = parseInt(h.slice(0,2), 16) || 0;
  const g = parseInt(h.slice(2,4), 16) || 0;
  const b = parseInt(h.slice(4,6), 16) || 0;
  return `${r}, ${g}, ${b}`;
}

function applyTheme(theme) {
  const root = document.documentElement;
  for (const [k, v] of Object.entries(theme)) {
    root.style.setProperty(k, v);
    root.style.setProperty(k + '-rgb', hexToRgbTriplet(v));
  }
  document.querySelectorAll('#themePanel input[type=color]').forEach(inp => {
    const varName = inp.dataset.var;
    if (theme[varName] !== undefined) {
      inp.value = theme[varName];
      const hexBox = document.getElementById('h-' + inp.id.replace('c-',''));
      if (hexBox) hexBox.value = theme[varName].toUpperCase();
    }
  });
  highlightMatchingPreset(theme);
}

function highlightMatchingPreset(theme) {
  const presets = document.querySelectorAll('#tpPresets .tp-preset');
  presets.forEach(el => {
    const name = el.dataset.theme;
    const presetTheme = PRESET_THEMES[name];
    if (!presetTheme) { el.classList.remove('active'); return; }
    const matches = Object.keys(DEFAULT_THEME).every(k =>
      (theme[k] || '').toLowerCase() === (presetTheme[k] || '').toLowerCase()
    );
    el.classList.toggle('active', matches);
  });
}

function saveTheme(theme) {
  try { localStorage.setItem(THEME_KEY, JSON.stringify(theme)); } catch (e) {}
}

function loadTheme() {
  try {
    const raw = localStorage.getItem(THEME_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === 'object' && parsed['--bg']) return parsed;
    return null;
  } catch (e) { return null; }
}

function getCurrentTheme() {
  const theme = {};
  for (const k of Object.keys(DEFAULT_THEME)) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(k).trim();
    if (v) theme[k] = v;
  }
  return theme;
}

function toggleThemePanel() {
  const panel = document.getElementById('themePanel');
  const isVisible = panel.classList.toggle('visible');
  panel.setAttribute('aria-hidden', !isVisible);
}

function applyPresetTheme(name) {
  const theme = PRESET_THEMES[name];
  if (!theme) return;
  applyTheme(theme);
  saveTheme(theme);
}

function resetTheme() {
  const root = document.documentElement;
  for (const k of Object.keys(DEFAULT_THEME)) {
    root.style.removeProperty(k);
    root.style.removeProperty(k + '-rgb');
  }
  applyTheme(DEFAULT_THEME);
  saveTheme(DEFAULT_THEME);
}

function exportTheme() {
  const theme = getCurrentTheme();
  const json = JSON.stringify(theme, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(() => {
      flashThemeBtn('✓ Copied!');
    }).catch(() => {
      window.prompt('Copy this theme JSON:', json);
    });
  } else {
    window.prompt('Copy this theme JSON:', json);
  }
}

function importTheme() {
  const json = window.prompt('Paste theme JSON to import:');
  if (!json) return;
  try {
    const theme = JSON.parse(json);
    const clean = {};
    for (const k of Object.keys(DEFAULT_THEME)) {
      if (typeof theme[k] === 'string' && /^#[0-9a-fA-F]{6}$/.test(theme[k])) {
        clean[k] = theme[k].toLowerCase();
      }
    }
    if (!clean['--bg']) {
      alert('Invalid theme JSON — missing --bg or wrong format.');
      return;
    }
    applyTheme(clean);
    saveTheme(clean);
    flashThemeBtn('✓ Imported!');
  } catch (e) {
    alert('Could not parse JSON: ' + e.message);
  }
}

function flashThemeBtn(text) {
  const btn = document.getElementById('themeBtn');
  if (!btn) return;
  const original = btn.textContent;
  btn.textContent = text;
  setTimeout(() => { btn.textContent = original; }, 1200);
}

function initThemeInputs() {
  document.querySelectorAll('#themePanel input[type=color]').forEach(colorBox => {
    const varName = colorBox.dataset.var;
    const hexBox = document.getElementById('h-' + colorBox.id.replace('c-',''));
    if (!hexBox) return;

    colorBox.addEventListener('input', () => {
      const val = colorBox.value;
      hexBox.value = val.toUpperCase();
      const theme = getCurrentTheme();
      theme[varName] = val;
      applyTheme(theme);
      saveTheme(theme);
    });

    hexBox.addEventListener('input', () => {
      let v = hexBox.value.trim();
      if (!v.startsWith('#')) v = '#' + v;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        colorBox.value = v.toLowerCase();
        const theme = getCurrentTheme();
        theme[varName] = v.toLowerCase();
        applyTheme(theme);
        saveTheme(theme);
      }
    });
    hexBox.addEventListener('blur', () => {
      const cur = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
      hexBox.value = cur.toUpperCase();
    });
  });
}

function renderPresetButtons() {
  const wrap = document.getElementById('tpPresets');
  if (!wrap) return;
  wrap.innerHTML = Object.entries(PRESET_THEMES).map(([name, t]) => {
    const swatches = ['--bg','--panel','--accent','--green','--orange','--purple','--gold']
      .map(k => `<span style="background:${t[k]}"></span>`).join('');
    return `<div class="tp-preset" data-theme="${name}" onclick="applyPresetTheme('${name}')">
      <div class="swatch-row">${swatches}</div>
      ${name}
    </div>`;
  }).join('');
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  const tp = document.getElementById('themePanel');
  if (tp && tp.classList.contains('visible')) toggleThemePanel();
});

(function initThemeStudio() {
  renderPresetButtons();
  initThemeInputs();
  const saved = loadTheme();
  applyTheme(saved || DEFAULT_THEME);
})();
</script>
