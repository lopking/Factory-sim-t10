 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Sim — Machine Ratios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap');

  :root {
    --bg: #080b0f;
    --panel: #0d1117;
    --panel2: #111720;
    --border: #1c2530;
    --accent: #00e5ff;
    --green: #39ff14;
    --orange: #ff8c42;
    --purple: #bf7fff;
    --gold: #ffd700;
    --red: #ff4466;
    --text: #c8d8e8;
    --dim: #4a5a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,229,255,0.012) 3px, rgba(0,229,255,0.012) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    padding: 28px 32px 22px;
    border-bottom: 2px solid var(--accent);
    background: linear-gradient(135deg, #080b0f, #0d1a24 60%, #080b0f);
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent) 40%, var(--purple) 60%, transparent);
  }
  header .glow {
    position: absolute; top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 160px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.12), transparent 70%);
    pointer-events: none;
  }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px; font-weight: 900;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(0,229,255,0.5);
  }
  .btn { font-family: 'Orbitron', sans-serif; padding: 10px 20px; background: rgba(0,229,255,0.1); border: 1px solid var(--accent); color: var(--accent); cursor: pointer; text-decoration: none; }
  .btn:hover { background: rgba(0,229,255,0.22); }
  .panel { background: var(--panel); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
  .result-item { font-family: 'Share Tech Mono', monospace; padding: 5px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .subtitle { font-family: 'Share Tech Mono', monospace; color: var(--dim); font-size: 11px; letter-spacing: 2px; margin-top: 5px; }

  /* ── LAYOUT ── */
  .container { max-width: 1300px; margin: 0 auto; padding: 28px 20px 60px; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row-1 { grid-template-columns: 1fr; }

  /* ── CARDS ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 0;
    overflow: hidden;
  }

  .card-head {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-head.cyan  { background: rgba(0,229,255,0.08); color: var(--accent);  border-bottom: 1px solid rgba(0,229,255,0.2); }
  .card-head.green { background: rgba(57,255,20,0.08);  color: var(--green);   border-bottom: 1px solid rgba(57,255,20,0.2); }
  .card-head.orange{ background: rgba(255,140,66,0.08); color: var(--orange);  border-bottom: 1px solid rgba(255,140,66,0.2); }
  .card-head.purple{ background: rgba(191,127,255,0.08);color: var(--purple);  border-bottom: 1px solid rgba(191,127,255,0.2); }
  .card-head.gold  { background: rgba(255,215,0,0.08);  color: var(--gold);    border-bottom: 1px solid rgba(255,215,0,0.2); }

  .card-body { padding: 14px 16px; }

  /* ── MACHINE TABLE ── */
  .mtable { width: 100%; border-collapse: collapse; }
  .mtable th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--dim); padding: 6px 10px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .mtable td {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; padding: 8px 10px;
    border-bottom: 1px solid rgba(28,37,48,0.7);
    vertical-align: middle;
  }
  .mtable tr:last-child td { border-bottom: none; }
  .mtable tr:hover td { background: rgba(0,229,255,0.03); }

  .mname { color: #fff; font-weight: 600; }
  .mtime { color: var(--accent); }
  .mmines { color: var(--green); }
  .mextract { color: var(--orange); }

  /* ── RATIO BARS ── */
  .ratio-item {
    margin-bottom: 14px;
  }
  .ratio-item:last-child { margin-bottom: 0; }

  .ratio-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text);
    margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .ratio-label .from { color: var(--purple); }
  .ratio-label .to   { color: var(--accent); }
  .ratio-label .val  { color: var(--gold); font-weight: 700; font-size: 13px; }

  .ratio-track {
    height: 8px; background: var(--panel2);
    border: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .ratio-fill {
    height: 100%; position: absolute; top: 0; left: 0;
    background: linear-gradient(90deg, var(--purple), var(--accent));
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  /* ── CHAIN FLOW ── */
  .chain-flow {
    display: flex; flex-wrap: wrap;
    align-items: center; gap: 0;
  }

  .chain-node {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 10px 14px;
    text-align: center;
    min-width: 110px;
    position: relative;
  }
  .chain-node .cn-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .chain-node .cn-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px; font-weight: 700; line-height: 1;
  }
  .chain-node .cn-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--dim); margin-top: 2px;
  }

  .chain-arrow {
    font-size: 18px; color: var(--orange);
    padding: 0 6px; flex-shrink: 0;
  }

  .cn-mine  { border-color: rgba(57,255,20,0.4);  }
  .cn-mine .cn-name  { color: var(--green); }
  .cn-mine .cn-count { color: var(--green); }

  .cn-extract { border-color: rgba(255,140,66,0.4); }
  .cn-extract .cn-name  { color: var(--orange); }
  .cn-extract .cn-count { color: var(--orange); }

  .cn-machine { border-color: rgba(0,229,255,0.4);  }
  .cn-machine .cn-name  { color: var(--accent); }
  .cn-machine .cn-count { color: var(--accent); }

  .cn-machine2 { border-color: rgba(191,127,255,0.4); }
  .cn-machine2 .cn-name  { color: var(--purple); }
  .cn-machine2 .cn-count { color: var(--purple); }

  /* ── CALCULATOR ── */
  .calc-row {
    display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap;
  }
  .calc-group { display: flex; flex-direction: column; gap: 5px; }
  .calc-group label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase;
  }
  select, input[type=number] {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    min-width: 160px;
    transition: border-color 0.2s;
  }
  select:focus, input[type=number]:focus { border-color: var(--accent); }
  select option { background: #111720; }

  .calc-btn {
    background: rgba(0,229,255,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 10px; letter-spacing: 2px;
    padding: 8px 20px; cursor: pointer;
    text-transform: uppercase; transition: all 0.2s;
  }
  .calc-btn:hover { background: rgba(0,229,255,0.2); }

  .calc-result {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 14px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    line-height: 2;
    min-height: 60px;
    display: none;
  }
  .calc-result.show { display: block; }
  .cr-line { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .cr-num  { font-size: 20px; font-weight: 700; color: var(--gold); }
  .cr-unit { color: var(--dim); }
  .cr-sep  { color: var(--border); margin: 0 4px; }

  /* ── NOTE BOX ── */
  .note {
    background: rgba(255,140,66,0.07);
    border-left: 3px solid var(--orange);
    padding: 10px 14px; margin-bottom: 20px;
    font-size: 12px; color: #ffb87a;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1.7;
  }

  .info-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .info-tile {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 12px 14px;
  }
  .info-tile .it-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--dim); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .info-tile .it-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 700;
  }
  .info-tile .it-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--dim); margin-top: 2px;
  }

  /* section title */
  .sec-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase;
    padding: 7px 14px;
    margin-bottom: 16px;
    border-left: 3px solid var(--accent);
    background: linear-gradient(90deg, rgba(0,229,255,0.07), transparent);
    color: var(--accent);
  }
  .sec-title.green  { border-color: var(--green);  background: linear-gradient(90deg,rgba(57,255,20,.07),transparent); color:var(--green); }
  .sec-title.orange { border-color: var(--orange); background: linear-gradient(90deg,rgba(255,140,66,.07),transparent); color:var(--orange); }
  .sec-title.purple { border-color: var(--purple); background: linear-gradient(90deg,rgba(191,127,255,.07),transparent); color:var(--purple); }
  .sec-title.gold   { border-color: var(--gold);   background: linear-gradient(90deg,rgba(255,215,0,.07),transparent); color:var(--gold); }

  /* highlight */
  em { font-style: normal; color: var(--gold); }
  strong { color: #fff; }

  @media(max-width:700px) {
    .row, .row-3 { grid-template-columns: 1fr; }
    h1 { font-size: 18px; }
    .chain-flow { flex-direction: column; align-items: flex-start; }
    .chain-arrow { transform: rotate(90deg); }
  }
</style>
</head>
<body>
<header>
  <div class="glow"></div>
  <h1>⚙ Factory Sim — Calculator</h1>
  <table>
   <th>
    <div style="margin-top: 15px;">
     <a href="index.html" class="btn btn-primary" style="text-decoration: none; display: inline-block;">
	LIST
     </a>
    </th>
    <th>
     <td></td>
     <td style="width: 30px;"></td> <!-- Acts as space -->
     <td></td>
    </th>
    <th>
     <div style="margin-top: 15px;">
      <a href="calc.html" class="btn btn-primary" style="text-decoration: none; display: inline-block;">
	RATIOS
      </a>
     </div>
    </th>
   </table>
</header>

  <div class="card" style="margin-bottom:28px;">
    <div class="card-head gold">How many mines/extractors do I need for N machines?</div>
    <div class="card-body">
      <div class="calc-row">
        <div class="calc-group">
          <label>Select Machine</label>
          <select id="calcMachine">
            <option value="single">Single Assembler (3.125s)</option>
            <option value="dual">Dual Assembler (1.875s)</option>
            <option value="quad">Quad Assembler (1.875s)</option>
            <option value="triple">Triple Assembler (1.667s)</option>
            <option value="accel">Accelerator (1.429s)</option>
            <option value="workstation">Workstation (1.429s)</option>
            <option value="quint">Quintuple Assembler (2.5s)</option>
            <option value="spectrum">Spectrum Cutter (0.5s)</option>
            <option value="reactor">Fluid Reactor (1.0s)</option>
            <option value="filter">Pressure Filter (1.5s)</option>
            <option value="distill">Distillation Tower (0.25s)</option>
            <option value="formInj">Form Injector (0.75s)</option>
            <option value="mixer">Multi-Flow Mixer (0.25s)</option>
            <option value="tumbler">Tumbler (0.25s)</option>
          </select>
        </div>
        <div class="calc-group">
          <label>Number of Machines</label>
          <input type="number" id="calcCount" value="1" min="1" max="500" style="width:100px;">
        </div>
        <button class="calc-btn" onclick="calculate()">Calculate →</button>
      </div>
      <div class="calc-result" id="calcResult"></div>
    </div>
  </div>

<script>
const machineData = {
  single:      { name:'Single Assembler',      time:3.125, mines:1.6,     extractors:0,    mineLabel:'ore mines',  extractLabel:'' },
  dual:        { name:'Dual Assembler',         time:1.875, mines:2.67,    extractors:0,    mineLabel:'ore mines',  extractLabel:'' },
  triple:      { name:'Triple Assembler',       time:1.667, mines:3.0,     extractors:0,    mineLabel:'ore mines',  extractLabel:'' },
  quad:        { name:'Quad Assembler',         time:1.875, mines:2.67,    extractors:0,    mineLabel:'ore mines',  extractLabel:'' }, 
  quint:       { name:'Quintuple Assembler',    time:2.5,   mines:2.0007,  extractors:0,    mineLabel:'ore mines',  extractLabel:'' },
  accel:       { name:'Accelerator',            time:1.429, mines:3.5,     extractors:0,    mineLabel:'ore mines',  extractLabel:'' },
  workstation: { name:'Workstation',            time:1.429, mines:3.5,     extractors:0,    mineLabel:'ore mines',  extractLabel:'' },
  spectrum:    { name:'Spectrum Cutter',        time:0.5,   mines:20,      extractors:0,    mineLabel:'Chromastone mines', extractLabel:'' },
  reactor:     { name:'Fluid Reactor',          time:1.0,   mines:5,       extractors:2.604,mineLabel:'ore mines',  extractLabel:'fluid extractors' },
  filter:      { name:'Pressure Filter',        time:1.5,   mines:3.33,    extractors:6.94, mineLabel:'ore mines',  extractLabel:'fluid extractors' },
  distill:     { name:'Distillation Tower',     time:0.25,  mines:0,       extractors:0,    mineLabel:'',           extractLabel:'' },
  formInj:     { name:'Form Injector',          time:0.75,  mines:6.67,    extractors:0,    mineLabel:'ore mines',  extractLabel:'' },
  mixer:       { name:'Multi-Flow Mixer',       time:0.25,  mines:0,       extractors:0,    mineLabel:'',           extractLabel:'' },
  tumbler:     { name:'Tumbler',                time:0.25,  mines:20,      extractors:1.56, mineLabel:'ore mines',  extractLabel:'fluid extractors' },
};

function calculate() {
  const key = document.getElementById('calcMachine').value;
  const n = parseFloat(document.getElementById('calcCount').value) || 1;
  const m = machineData[key];
  const res = document.getElementById('calcResult');

  const totalMines = m.mines * n;
  const totalExt   = m.extractors * n;
  const minesRound = Math.ceil(totalMines);
  const extRound   = Math.ceil(totalExt);

  let html = `<div style="font-family:Share Tech Mono,monospace;font-size:12px;line-height:2.2;">`;
  html += `<div class="cr-line">Running <em style="font-size:18px;color:var(--gold)">${n}</em> <strong>${m.name}</strong> machines at full speed:</div>`;
  html += `<div style="height:8px;"></div>`;

  if (totalMines > 0) {
    html += `<div class="cr-line">
      🟢 <span class="cr-num">${totalMines.toFixed(2)}</span>
      <span style="color:var(--text)">${m.mineLabel} needed</span>
      <span class="cr-sep">|</span>
      <span style="color:var(--green)">Round up → <strong style="color:#fff">${minesRound} mines</strong></span>
    </div>`;
  }

  if (totalExt > 0) {
    html += `<div class="cr-line">
      🟠 <span class="cr-num">${totalExt.toFixed(2)}</span>
      <span style="color:var(--text)">${m.extractLabel} needed</span>
      <span class="cr-sep">|</span>
      <span style="color:var(--orange)">Round up → <strong style="color:#fff">${extRound} extractors</strong></span>
    </div>`;
  }

  if (totalMines === 0 && totalExt === 0) {
    html += `<div style="color:var(--dim)">This machine is fed by other machines (no direct mine input needed).</div>`;
  }

  html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);">
    Cycle time: <em>${m.time}s</em> per machine
    · Total throughput: <em>${(n / m.time).toFixed(2)}</em> items/second
  </div>`;
  html += `</div>`;

  res.innerHTML = html;
  res.classList.add('show');
}
</script>
</body>
</html>
